services:
  - type: web
    name: dp-resume-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: anthropic/claude-opus-4-6
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
